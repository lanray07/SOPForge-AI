name: Upload Build to App Store Connect

on:
  push:
    tags:
      - "app-store-v*"
  workflow_dispatch:
    inputs:
      marketing_version:
        description: App marketing version
        required: true
        default: "1.0"
      build_number:
        description: App Store build number
        required: true
        default: "1"

permissions:
  contents: read

jobs:
  archive-and-upload:
    name: Archive and Upload
    runs-on: macos-15

    env:
      PROJECT_PATH: SOPForgeAI.xcodeproj
      SCHEME: SOPForgeAI
      CONFIGURATION: Release
      BUNDLE_ID: com.sopforge.ai
      ARCHIVE_PATH: build/SOPForgeAI.xcarchive
      EXPORT_PATH: build/export
      API_KEY_PATH: build/AuthKey.p8
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID || secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID || secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
      APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
      MARKETING_VERSION: ${{ github.event.inputs.marketing_version || '1.0' }}
      BUILD_NUMBER: ${{ github.event.inputs.build_number || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate required secrets
        run: |
          test -n "$APPLE_TEAM_ID" || (echo "Missing APPLE_TEAM_ID secret" && exit 1)
          test -n "$ASC_KEY_ID" || (echo "Missing ASC_KEY_ID or APP_STORE_CONNECT_API_KEY_ID secret" && exit 1)
          test -n "$ASC_ISSUER_ID" || (echo "Missing ASC_ISSUER_ID or APP_STORE_CONNECT_ISSUER_ID secret" && exit 1)
          if [ -z "$ASC_PRIVATE_KEY_BASE64" ] && [ -z "$APP_STORE_CONNECT_API_PRIVATE_KEY" ]; then
            echo "Missing ASC_PRIVATE_KEY_BASE64 or APP_STORE_CONNECT_API_PRIVATE_KEY secret"
            exit 1
          fi

      - name: Write App Store Connect API key
        run: |
          mkdir -p build
          if [ -n "$ASC_PRIVATE_KEY_BASE64" ]; then
            printf '%s' "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          else
            printf '%s' "$APP_STORE_CONNECT_API_PRIVATE_KEY" | perl -pe 's/\\n/\n/g' > "$API_KEY_PATH"
          fi
          chmod 600 "$API_KEY_PATH"

      - name: Archive app
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Create export options
        run: |
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          PLIST

      - name: Upload archive to App Store Connect
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist build/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload archive artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SOPForgeAI-xcarchive
          path: |
            build/SOPForgeAI.xcarchive
            build/ExportOptions.plist
          if-no-files-found: ignore
