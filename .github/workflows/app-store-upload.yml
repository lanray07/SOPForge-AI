name: Upload Build to App Store Connect

on:
  push:
    tags:
      - "app-store-v*"
  workflow_dispatch:
    inputs:
      marketing_version:
        description: App marketing version
        required: true
        default: "1.0"
      build_number:
        description: App Store build number
        required: true
        default: "1"

permissions:
  contents: read

jobs:
  archive-and-upload:
    name: Archive and Upload
    runs-on: macos-15

    env:
      PROJECT_PATH: SOPForgeAI.xcodeproj
      SCHEME: SOPForgeAI
      CONFIGURATION: Release
      BUNDLE_ID: com.sopforge.ai
      ARCHIVE_PATH: build/SOPForgeAI.xcarchive
      EXPORT_PATH: build/export
      API_KEY_PATH: build/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
      MARKETING_VERSION: ${{ github.event.inputs.marketing_version || '1.0' }}
      BUILD_NUMBER: ${{ github.event.inputs.build_number || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.APPLE_TEAM_ID }}" || (echo "Missing APPLE_TEAM_ID secret" && exit 1)
          test -n "${{ secrets.ASC_KEY_ID }}" || (echo "Missing ASC_KEY_ID secret" && exit 1)
          test -n "${{ secrets.ASC_ISSUER_ID }}" || (echo "Missing ASC_ISSUER_ID secret" && exit 1)
          test -n "${{ secrets.ASC_PRIVATE_KEY_BASE64 }}" || (echo "Missing ASC_PRIVATE_KEY_BASE64 secret" && exit 1)

      - name: Write App Store Connect API key
        run: |
          mkdir -p build
          echo "${{ secrets.ASC_PRIVATE_KEY_BASE64 }}" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

      - name: Archive app
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Create export options
        run: |
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          PLIST

      - name: Upload archive to App Store Connect
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist build/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload archive artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SOPForgeAI-xcarchive
          path: |
            build/SOPForgeAI.xcarchive
            build/ExportOptions.plist
          if-no-files-found: ignore
