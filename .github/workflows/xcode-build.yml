name: Xcode Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ios:
    name: Build SOPForge AI
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List project settings
        run: |
          xcodebuild -list -project SOPForgeAI.xcodeproj

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project SOPForgeAI.xcodeproj \
            -scheme SOPForgeAI \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO
